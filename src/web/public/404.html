<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Jig</title>
    <script>
      // SPA fallback for GitHub Pages: rewrite deep-link path into query
      // string, then redirect to /. index.html restores the URL via
      // history.replaceState before React mounts.
      // See https://github.com/rafgraph/spa-github-pages
      (function () {
        var segmentCount = 0; // 0 because we serve at root (custom domain)
        var l = window.location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname
              .split("/")
              .slice(0, 1 + segmentCount)
              .join("/") +
            "/?/" +
            l.pathname
              .slice(1)
              .split("/")
              .slice(segmentCount)
              .join("/")
              .replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
